# DNSCrypt
# To enable, use --enable-dnscrypt to configure before compiling Unbound.
# -----------------------------------------------------------------------------------------------------
# After compiling:
# apt install autoconf automake build-essential libsodium-dev libevent-dev
# git clone https://github.com/cofyc/dnscrypt-wrapper.git
# cd dnscrypt-wrapper
# make configure
# ./configure
# make install
# install -d -m 755 '/usr/local/sbin'
# install -p dnscrypt-wrapper '/usr/local/sbin'
# -----------------------------------------------------------------------------------------------------
# Quick Start
# 1. Generate the provider key pair:
# dnscrypt-wrapper --gen-provider-keypair \
#  --provider-name=2.dnscrypt-cert.<yourdomain> --ext-address=<external server ip>
#
# 2. Generate a secret key and certificate, which will be used to encrypt and authenticate DNS queries:
# dnscrypt-wrapper --gen-crypt-keypair --crypt-secretkey-file=1.key
# dnscrypt-wrapper --gen-cert-file --crypt-secretkey-file=1.key --provider-cert-file=1.cert \
#                   --provider-publickey-file=public.key --provider-secretkey-file=secret.key
#

server:
     interface: 127.0.0.1@443
     interface: ::1@443

dnscrypt:
     dnscrypt-enable: yes
     dnscrypt-port: 443
     dnscrypt-provider: 2.dnscrypt-cert.example.com
     dnscrypt-secret-key: /etc/unbound/1.key
     dnscrypt-provider-cert: /etc/unbound/1.cert
