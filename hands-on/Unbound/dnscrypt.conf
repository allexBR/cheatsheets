# DNSCrypt
# To enable, use --enable-dnscrypt to configure before compiling Unbound.
# ----------------------------------------------------------------------------------
# After compiling:
# apt install autoconf automake build-essential libsodium-dev libevent-dev
# git clone https://github.com/cofyc/dnscrypt-wrapper.git
# cd dnscrypt-wrapper
# make configure
# ./configure
# make install
# install -d -m 755 '/usr/local/sbin'
# install -p dnscrypt-wrapper '/usr/local/sbin'
# ----------------------------------------------------------------------------------
# Quick Start / Generate the provider key pair:
# dnscrypt-wrapper --gen-provider-keypair \
#  --provider-name=2.dnscrypt-cert.<yourdomain> --ext-address=<external server ip>
#

server:
     interface: 127.0.0.1@443
     interface: ::1@443

dnscrypt:
     dnscrypt-enable: yes
     dnscrypt-port: 443
     dnscrypt-provider: 2.dnscrypt-cert.example.com
     dnscrypt-secret-key: /path/unbound-conf/keys1/1.key
     dnscrypt-secret-key: /path/unbound-conf/keys2/1.key
     dnscrypt-provider-cert: /path/unbound-conf/keys1/1.cert
     dnscrypt-provider-cert: /path/unbound-conf/keys2/1.cert
