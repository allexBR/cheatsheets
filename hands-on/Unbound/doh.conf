# Suggested path /etc/unbound/conf.d  or other

server:
    interface: 127.0.0.1@4443
    https-port: 4443
    http-endpoint: "/dns-query"
    http-notls-downstream: yes
    #http-max-streams: 200
    #http-query-buffer-size: 1m
    #http-response-buffer-size: 1m


